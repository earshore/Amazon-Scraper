<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #f0f2f2;
        --surface: #ffffff;
        --text: #0f1111;
        --muted: #565959;
        --line: #e3e6e6;
        --chip: #f0f2f2;
        --primary: #ff9900;
        --primary-hover: #e88b00;
        --primary-text: #0f1111;
        --secondary: #232f3e;
        --secondary-hover: #37475a;
        --ok: #067d62;
        --ok-bg: #f4faf7;
        --ok-line: #d4e8df;
        --warn: #b78103;
        --warn-label: #856404;
        --warn-bg: #fffbf0;
        --warn-line: #f0e0a0;
        --danger: #c53030;
        --danger-bg: #fff5f5;
        --danger-line: #feb2b2;
        --neutral: #879596;
        --radius: 6px;
        --type-xs: 10px;
        --type-sm: 11px;
        --type-md: 12px;
        --type-lg: 13px;
        --type-title: 14px;
      }
      body {
        width: 400px;
        padding: 10px;
        font-family: system-ui, -apple-system, "Segoe UI", Arial, "Microsoft YaHei",
          sans-serif;
        background: var(--bg);
        margin: 0;
        color: var(--text);
      }
      .card {
        background: var(--surface);
        padding: 12px;
        border-radius: var(--radius);
        border: 1px solid var(--line);
        box-shadow: none;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 8px;
        min-height: 28px;
      }
      .header img {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .header-text {
        display: flex;
        align-items: baseline;
        gap: 6px;
        min-width: 0;
        flex: 1;
      }
      .header-text h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.2;
        white-space: nowrap;
      }
      .header-text .version {
        margin: 0;
        font-size: 10px;
        font-weight: 500;
        color: var(--muted);
        white-space: nowrap;
      }
      /* Unified page status strip: ok / warn / detecting share one layout */
      .page-hint {
        display: none;
        margin: 0 0 6px;
        padding: 0 0 6px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
        text-align: left;
        border: none;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        background: transparent;
      }
      .page-hint.ok,
      .page-hint.warn,
      .page-hint.detecting {
        /* JS sets display:flex */
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .page-hint .ph-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--ok);
        flex-shrink: 0;
      }
      .page-hint.warn .ph-dot {
        background: var(--warn);
      }
      .page-hint.detecting .ph-dot {
        background: var(--neutral);
      }
      .page-hint .ph-label {
        font-weight: 600;
        font-size: var(--type-sm);
        color: var(--ok);
        letter-spacing: 0.01em;
        flex-shrink: 0;
      }
      .page-hint.warn .ph-label {
        color: var(--warn-label);
      }
      .page-hint.detecting .ph-label {
        color: var(--muted);
        font-weight: 500;
      }
      .page-hint .ph-meta {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-width: 0;
        flex: 1 1 auto;
        flex-wrap: wrap;
      }
      .page-hint .ph-chip {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: var(--type-xs);
        font-weight: 500;
        color: var(--text);
        background: var(--chip);
        padding: 1px 5px;
        border-radius: 3px;
        max-width: 160px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .page-hint .ph-chip.asin {
        letter-spacing: 0.02em;
      }
      .page-hint .ph-note {
        font-size: var(--type-xs);
        font-weight: 400;
        color: var(--muted);
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }
      /* Compact toolbar: primary + secondary side by side */
      .actions {
        display: flex;
        flex-direction: row;
        gap: 8px;
        margin: 0 0 8px;
        align-items: stretch;
      }
      .actions > button {
        margin: 0;
        height: 36px;
        padding: 0 14px;
        border: none;
        border-radius: var(--radius);
        font-size: var(--type-lg);
        font-weight: 600;
        line-height: 36px;
        text-align: center;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s ease, opacity 0.15s ease,
          filter 0.15s ease;
      }
      .actions > button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #scrapeBtn {
        flex: 1 1 auto;
        min-width: 0;
        background: var(--primary);
        color: var(--primary-text);
      }
      #scrapeBtn:hover:not(:disabled) {
        background: var(--primary-hover);
      }
      #scrapeBtn:active:not(:disabled) {
        filter: brightness(0.96);
      }
      #downloadBtn {
        display: none;
        flex: 0 0 auto;
        min-width: 88px;
        background: var(--secondary);
        color: #fff;
      }
      #downloadBtn:hover {
        background: var(--secondary-hover);
      }
      #downloadBtn:active {
        filter: brightness(1.05);
      }

      /* Shared banner family: toast / success / partial / danger */
      #status {
        display: none;
        margin: 0 0 8px;
        padding: 6px 8px;
        border-radius: var(--radius);
        font-size: var(--type-sm);
        font-weight: 400;
        line-height: 1.4;
        text-align: left;
        cursor: default;
        user-select: text;
        pointer-events: none;
        box-shadow: none;
        border: 1px solid var(--line);
        border-left-width: 3px;
        border-left-style: solid;
        background: var(--chip);
        color: var(--text);
      }
      #status.status-toast {
        display: flex;
        align-items: center;
        gap: 6px;
        border-left-color: var(--neutral);
        padding: 5px 8px;
      }
      #status.status-toast.ok {
        background: var(--ok-bg);
        border-color: var(--ok-line);
        border-left-color: var(--ok);
      }
      #status.status-toast.info {
        border-left-color: var(--muted);
      }
      #status.status-toast .toast-mark {
        flex-shrink: 0;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--neutral);
        color: #fff;
        font-size: 8px;
        font-weight: 700;
        line-height: 12px;
        text-align: center;
      }
      #status.status-toast.ok .toast-mark {
        background: var(--ok);
      }
      #status.status-toast .toast-text {
        flex: 1;
        min-width: 0;
      }
      #status.success {
        background: var(--ok-bg);
        border-color: var(--ok-line);
        border-left-color: var(--ok);
        pointer-events: auto;
      }
      #status.partial {
        background: var(--warn-bg);
        border-color: var(--warn-line);
        border-left-color: var(--warn);
        pointer-events: auto;
      }
      #status.status-banner.danger {
        background: var(--danger-bg);
        border-color: var(--danger-line);
        border-left-color: var(--danger);
        color: var(--text);
      }
      #status .banner-title {
        font-weight: 600;
        font-size: var(--type-sm);
        color: var(--danger);
        margin: 0 0 2px;
      }
      #status .banner-detail {
        font-size: var(--type-sm);
        color: var(--muted);
        margin: 0;
      }
      .warn-block,
      .note-block {
        border-radius: 4px;
        padding: 6px 8px;
        margin: 0 0 6px;
        font-size: var(--type-sm);
        border: 1px solid var(--line);
      }
      .warn-block {
        background: var(--warn-bg);
        border-color: var(--warn-line);
        color: var(--warn-label);
      }
      .note-block {
        background: var(--chip);
        color: var(--muted);
      }
      .msg-title {
        font-weight: 600;
        margin-bottom: 2px;
        font-size: var(--type-sm);
      }
      .warn-block ul,
      .note-block ul,
      .warnings-list,
      .notes-list {
        margin: 0;
        padding-left: 16px;
      }
      .cache-line {
        margin-top: 4px;
        font-size: 10px;
        color: var(--muted);
      }

      #loader {
        display: none;
        text-align: center;
        padding: 6px 0;
      }
      #loader p {
        display: none; /* toast already explains; spinner only */
      }
      .spinner {
        width: 22px;
        height: 22px;
        border: 2px solid var(--line);
        border-top: 2px solid var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Result body — primary real estate */
      #resultPreview {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 10px;
        display: none;
        max-height: 520px;
        overflow-y: auto;
      }
      .coverage-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin: 0 0 8px;
      }
      .coverage-chip {
        font-size: var(--type-xs);
        padding: 2px 6px;
        border-radius: 999px;
        background: var(--chip);
        color: var(--text);
      }
      .coverage-chip.ok {
        background: var(--ok-bg);
        color: var(--ok);
      }
      .coverage-chip.warn {
        background: var(--warn-bg);
        color: var(--warn-label);
      }
      .coverage-chip.bad {
        background: var(--danger-bg);
        color: var(--danger);
      }
      .meta-row {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 3px;
      }
      .product-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        margin: 0 0 4px;
        line-height: 1.35;
      }
      .thumb {
        max-width: 72px;
        max-height: 72px;
        border-radius: 4px;
        border: 1px solid var(--line);
        object-fit: contain;
        margin: 0 0 8px;
        background: var(--chip);
        float: right;
        margin-left: 10px;
      }
      .section-title {
        font-weight: 600;
        border-bottom: 1px solid var(--line);
        margin: 10px 0 6px;
        padding-bottom: 3px;
        font-size: 12px;
        clear: both;
      }
      .bullet-list {
        font-size: 12px;
        padding-left: 16px;
        margin: 0;
        line-height: 1.45;
      }
      .empty-li {
        color: var(--muted);
        font-style: italic;
        list-style: none;
        margin-left: -16px;
        font-size: 11px;
      }
      .empty-p {
        color: var(--muted);
        font-size: 11px;
        font-style: italic;
        margin: 0;
      }
      .review-card {
        border-bottom: 1px solid var(--line);
        padding: 8px 0;
      }
      .review-card:last-of-type {
        border-bottom: none;
      }
      .review-top {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 2px;
      }
      .stars {
        color: var(--primary);
        font-size: var(--type-md);
        white-space: nowrap;
      }
      .star-empty {
        color: var(--line);
      }
      .review-headline {
        font-weight: 600;
        color: var(--text);
        font-size: 12px;
      }
      .review-date {
        color: var(--muted);
        font-size: 10px;
      }
      .review-body {
        color: var(--text);
        font-size: 12px;
        margin-top: 4px;
        line-height: 1.4;
      }
      .scope-note {
        margin-top: 8px;
        padding-top: 6px;
        border-top: 1px solid var(--line);
        font-size: 10px;
        color: var(--muted);
        line-height: 1.35;
        clear: both;
      }
      .footer-links {
        margin-top: 8px;
        font-size: 10px;
        color: var(--muted);
        text-align: center;
        line-height: 1.3;
      }
      .footer-links a {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <img src="icons/icon48.png" width="22" height="22" alt="" />
        <div class="header-text">
          <h3 title="Amazon Product Insight">Product Insight</h3>
          <p class="version">v1.6.2</p>
        </div>
      </div>

      <div id="pageHint" class="page-hint" role="status"></div>

      <div class="actions">
        <button
          id="scrapeBtn"
          type="button"
          data-mode="fresh"
          title="解析当前商品页 DOM，结果可导出"
        >
          分析
        </button>
        <button id="downloadBtn" type="button" title="下载 JSON">导出</button>
      </div>

      <div id="loader" role="status" aria-live="polite" aria-busy="true">
        <div class="spinner"></div>
        <p>正在解析…</p>
      </div>
      <div id="status" role="status" aria-live="polite"></div>
      <div id="resultPreview"></div>
      <div class="footer-links">
        本地解析 ·
        <a
          href="https://github.com/earshore/Amazon-Scraper/blob/main/PRIVACY.md"
          target="_blank"
          rel="noopener noreferrer"
          >隐私</a
        >
      </div>
    </div>
    <noscript>
      <p style="padding: 12px; color: #c53030">
        需要启用 JavaScript 才能使用本扩展弹窗。
      </p>
    </noscript>
    <script src="scraper/marketplaces.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
